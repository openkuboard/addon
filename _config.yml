# Jekyll configuration for the OpenKuboard addon repository GitHub Pages site.
#
# This repository is BOTH an addon data source (raw addon.json / k8s manifests that
# the platform fetches via raw.githubusercontent.com) AND a documentation site.
# To stop Jekyll/Liquid from parsing addon data files (which contain Prometheus
# rule expressions like `{{ printf ... }}` that break Liquid), all addon data
# directories and the index are excluded below.

title: OpenKuboard Addon
description: >-
  OpenKuboard addon (套件) main repository. Addon definitions, development
  documentation, and addon showcase. Both a data source (raw) and docs site.

# Project-page URL is https://openkuboard.github.io/addon/
baseurl: "/addon"
url: "https://openkuboard.github.io"

# GitHub Pages native theme (no extra build deps)
theme: jekyll-theme-primer

# GFM-style markdown with table support
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude ALL addon data and non-doc files so Liquid never touches them.
# (resources.yaml contains `{{ printf ... }}` Prometheus rules that break Liquid.)
# NOTE: patterns are substring/path matches in Jekyll — use trailing slashes for
# directories so they don't accidentally match top-level files (e.g. "index" would
# also exclude index.md).
exclude:
  - "index/"
  - "*.addons.openkuboard.github.io"
  - "*.addons.openkuboard.github.io/**"
  - "Makefile"
  - "scripts"
  - "node_modules"
  - "vendor"
  - "Gemfile"
  - "Gemfile.lock"
  - "README.md"
  - "README.zh-CN.md"

# Default layout for documentation pages (both Chinese docs/ and English en/)
defaults:
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "en"
    values:
      layout: default

permalink: pretty
