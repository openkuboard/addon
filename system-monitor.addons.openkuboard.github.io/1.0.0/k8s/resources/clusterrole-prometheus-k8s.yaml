apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # 带 -{{MONITOR_NAMESPACE}} 后缀，避免与 Kuboard 自带 system-monitor 套件的同名 ClusterRole 互相覆盖。
  name: prometheus-k8s-{{MONITOR_NAMESPACE}}
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - nodes/metrics
  - services
  - endpoints
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- nonResourceURLs:
  - /metrics
  verbs:
  - get
