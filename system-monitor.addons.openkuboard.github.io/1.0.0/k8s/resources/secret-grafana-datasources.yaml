apiVersion: v1
# datasources URL 必须指向当前套件部署所在 ns 的 prometheus-k8s Service。
# 上游模板硬编码 kuboard.svc，单装 openkuboard 时 Grafana 会查询不到数据。
# 用 stringData 让 K8s 自动 base64 编码，并通过 {{MONITOR_NAMESPACE}} 模板变量替换。
stringData:
  datasources.yaml: |-
    {
        "apiVersion": 1,
        "datasources": [
            {
                "access": "proxy",
                "editable": false,
                "name": "prometheus",
                "orgId": 1,
                "type": "prometheus",
                "url": "http://prometheus-k8s.{{MONITOR_NAMESPACE}}.svc:9090",
                "version": 1
            }
        ]
    }
kind: Secret
metadata:
  name: grafana-datasources
  namespace: {{MONITOR_NAMESPACE}}
type: Opaque
