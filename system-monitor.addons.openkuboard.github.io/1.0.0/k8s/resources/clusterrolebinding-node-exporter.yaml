apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  # 加 -{{MONITOR_NAMESPACE}} 后缀避免与 Kuboard 自带套件互相覆盖。
  name: node-exporter-{{MONITOR_NAMESPACE}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-exporter-{{MONITOR_NAMESPACE}}
subjects:
- kind: ServiceAccount
  name: node-exporter
  namespace: {{MONITOR_NAMESPACE}}
