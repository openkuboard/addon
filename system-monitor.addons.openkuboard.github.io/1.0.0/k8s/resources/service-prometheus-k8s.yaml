apiVersion: v1
kind: Service
metadata:
  labels:
    prometheus: k8s
  name: prometheus-k8s
  namespace: {{MONITOR_NAMESPACE}}
spec:
  ports:
  - name: web
    port: 9090
    targetPort: web
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: k8s
  sessionAffinity: ClientIP
