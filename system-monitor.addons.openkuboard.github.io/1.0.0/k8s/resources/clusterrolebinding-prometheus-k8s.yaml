apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  # 与同名 ClusterRole 一致：带 -{{MONITOR_NAMESPACE}} 后缀，避免与 Kuboard 套件互相覆盖。
  name: prometheus-k8s-{{MONITOR_NAMESPACE}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-k8s-{{MONITOR_NAMESPACE}}
subjects:
- kind: ServiceAccount
  name: prometheus-k8s
  namespace: {{MONITOR_NAMESPACE}}
