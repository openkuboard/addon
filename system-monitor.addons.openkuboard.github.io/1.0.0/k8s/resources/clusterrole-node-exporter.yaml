apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # 加 -{{MONITOR_NAMESPACE}} 后缀避免与 Kuboard 自带套件互相覆盖。
  name: node-exporter-{{MONITOR_NAMESPACE}}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
